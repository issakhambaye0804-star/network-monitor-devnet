# Configuration Nginx pour le load balancing
# Projet d'Examen DEVNET - L3 RI ISI Keur Massar

events {
    worker_connections 1024;
}

http {
    upstream network_monitor_backend {
        server app1:5000;
        server app2:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Configuration principale
        location / {
            proxy_pass http://network_monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://network_monitor_backend/health;
            access_log off;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://network_monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files (si nécessaire)
        location /static/ {
            proxy_pass http://network_monitor_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
